{% extends "base.html" %}
{% block content %}

<form method="POST" action="/login" novalidate>
    {{ form.hidden_tag() }}
    <div class="mb-3">
        {{ form.blogid.label(class='form-label') }}<br>
        {{ form.blogid(class='form-select') }}

    {{ form.submit(class="btn btn-primary") }}
</form>
{% endblock %}
