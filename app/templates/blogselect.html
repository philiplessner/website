{% extends "base.html" %}
{% block content %}

<div class="container-fluid my-3 mx-8">
    <div class="row">
        <div class="col-3">
<form method="POST" action="{{ url_for('admin.blog_select') }}" novalidate>
    {{ form.hidden_tag() }}
    <div class="mb-3">
        {{ form.blogid.label(class='form-label') }}<br>
        {{ form.blogid(class='form-select') }}
    </div>
    {{ form.submit(class="btn btn-primary") }}
</form>
        </div>
        <div class="col-5">
  <div class="overflow-auto border p-3" style="max-height: 600px;">
  {% for blog in blogs %}
    <p><strong>Blog ID: </strong> {{ blog[5] }}</p>
    <p><strong>Blog Title: </strong>{{ blog[0] }}</p>
    <hr>
    {% endfor %}
  </div>
  </div>
    </div>
</div>

{% endblock %}
