{% extends "base.html" %}

{% block content %}
<div class="container">
    <h3 class="title">Sign Up</h3>
    <div class="row">
    <div class="col-4 position-relative mb-4">
{% with messages = get_flashed_messages() %}
{% if messages %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ messages[0] }}. Go to <a href="{{ url_for('admin.login') }}">login page</a>.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="close"></button>
    </div>
{% endif %}
{% endwith %}
<form method="POST" action="/signup">
        <form method="POST" action="/signup">
            <div class="mb-3">
                <label for="SignupEmail" class="form-label">Email Address</label>
                <input class="form-control" type="email" name="email" aria-describedby="emailHelp" placeholder="Your Email" autofocus="">
            </div>
            <div class="mb-3">
                <label for="SignupPassword" class="form-label">Name</label>
                <input class="form-control" type="name" name="name" placeholder="First Name Last Name">
            </div>
            <div class="mb-3">
                <label for="SignupPassword" class="form-label">Password</label>
                <input class="form-control" type="password" name="password" placeholder="Password">
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>
    </div>
    </div>
</div>
{% endblock %}
